<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="820"
  viewBox="0 0 1200 820"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Rin Installer desktop preview</title>
  <desc id="desc">
    Static preview of the Electron-based Rin installer window with configuration
    fields, auth status, safety boundary, and install plan.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ff" />
      <stop offset="1" stop-color="#eef7ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="18"
        stdDeviation="24"
        flood-color="#24324d"
        flood-opacity="0.22"
      />
    </filter>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)" />
  <rect
    x="90"
    y="62"
    width="1020"
    height="696"
    rx="24"
    fill="#ffffff"
    filter="url(#shadow)"
  />
  <rect x="90" y="62" width="1020" height="54" rx="24" fill="#20283a" />
  <circle cx="124" cy="89" r="8" fill="#ff6b6b" />
  <circle cx="150" cy="89" r="8" fill="#ffd166" />
  <circle cx="176" cy="89" r="8" fill="#06d6a0" />
  <text
    x="600"
    y="95"
    text-anchor="middle"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="17"
    fill="#e8ecf6"
  >
    Rin Installer
  </text>

  <text
    x="138"
    y="164"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="32"
    font-weight="700"
    fill="#1d2433"
  >
    Rin Installer
  </text>
  <rect
    x="138"
    y="184"
    width="924"
    height="54"
    rx="14"
    fill="#edf4ff"
    stroke="#c7dcff"
  />
  <text
    x="160"
    y="217"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="16"
    fill="#304462"
  >
    Runs inside the packaged Electron desktop host. No browser server or browser
    fallback is exposed.
  </text>

  <g font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#263246">
    <text x="138" y="284" font-weight="700">Language</text>
    <rect
      x="138"
      y="296"
      width="286"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="160" y="325">English</text>

    <text x="457" y="284" font-weight="700">Target user</text>
    <rect
      x="457"
      y="296"
      width="286"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="479" y="325">alice</text>

    <text x="776" y="284" font-weight="700">Provider</text>
    <rect
      x="776"
      y="296"
      width="286"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="798" y="325">github-copilot · auth ready</text>

    <text x="138" y="380" font-weight="700">Install directory</text>
    <rect
      x="138"
      y="392"
      width="605"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="160" y="421">C:\Users\alice\.rin</text>

    <text x="776" y="380" font-weight="700">Model</text>
    <rect
      x="776"
      y="392"
      width="286"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="798" y="421">gpt-5.1</text>

    <text x="138" y="476" font-weight="700">Thinking level</text>
    <rect
      x="138"
      y="488"
      width="286"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="160" y="517">medium</text>

    <text x="457" y="476" font-weight="700">API key / manual token</text>
    <rect
      x="457"
      y="488"
      width="286"
      height="46"
      rx="10"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="479" y="517">••••••••••••</text>

    <rect x="776" y="488" width="286" height="46" rx="10" fill="#2d6cdf" />
    <text x="919" y="517" text-anchor="middle" fill="#ffffff" font-weight="700">
      Save provider auth
    </text>
  </g>

  <rect
    x="138"
    y="558"
    width="286"
    height="52"
    rx="12"
    fill="#fff6df"
    stroke="#f1d491"
  />
  <text
    x="160"
    y="589"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="15"
    fill="#6c5317"
  >
    Provider auth already exists.
  </text>
  <rect
    x="457"
    y="558"
    width="286"
    height="52"
    rx="12"
    fill="#eef8f1"
    stroke="#badfc4"
  />
  <text
    x="479"
    y="589"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="15"
    fill="#245b35"
  >
    Ready plan can apply directly.
  </text>
  <rect x="776" y="558" width="286" height="52" rx="12" fill="#2d6cdf" />
  <text
    x="919"
    y="589"
    text-anchor="middle"
    font-family="Inter, Segoe UI, sans-serif"
    font-size="16"
    font-weight="700"
    fill="#ffffff"
  >
    Apply installation
  </text>

  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="138" y="650" font-size="18" font-weight="700" fill="#1d2433">
      Safety boundary
    </text>
    <rect
      x="138"
      y="664"
      width="435"
      height="62"
      rx="12"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="160" y="691" font-size="14" fill="#344055">
      No sudo credentials in the UI. Protected writes
    </text>
    <text x="160" y="713" font-size="14" fill="#344055">
      use a private apply-plan terminal handoff.
    </text>

    <text x="627" y="650" font-size="18" font-weight="700" fill="#1d2433">
      Install plan
    </text>
    <rect
      x="627"
      y="664"
      width="435"
      height="62"
      rx="12"
      fill="#f8fafc"
      stroke="#d9e2ef"
    />
    <text x="649" y="691" font-size="14" fill="#344055">
      Write runtime, settings, auth, launchers,
    </text>
    <text x="649" y="713" font-size="14" fill="#344055">
      and Windows GUI-first Startup/Desktop entries.
    </text>
  </g>
</svg>
