name: publish-stable

on:
  schedule:
    - cron: '5 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-stable
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Resolve beta promotion target
        id: plan
        run: |
          set -eu
          beta_ref=$(node -e 'const manifest = require("./release-manifest.json"); process.stdout.write(String(manifest.beta?.ref || "").trim());')
          beta_version=$(node -e 'const manifest = require("./release-manifest.json"); process.stdout.write(String(manifest.beta?.version || "").trim());')
          if [ -z "$beta_ref" ] || [ -z "$beta_version" ]; then
            echo 'Missing beta candidate in release-manifest.json' >&2
            exit 1
          fi
          plan_json=$(node scripts/release/plan-release.mjs --channel stable-promotion --beta-version "$beta_version")
          version=$(node -e 'const value = JSON.parse(process.argv[1]); process.stdout.write(value.version);' "$plan_json")
          echo "beta_ref=$beta_ref" >> "$GITHUB_OUTPUT"
          echo "beta_version=$beta_version" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Prepare candidate worktree
        run: |
          set -eu
          candidate_dir="$RUNNER_TEMP/stable-candidate"
          git worktree add --detach "$candidate_dir" '${{ steps.plan.outputs.beta_ref }}'
      - name: Install candidate dependencies
        working-directory: ${{ runner.temp }}/stable-candidate
        run: npm ci --no-fund --no-audit
      - name: Build candidate
        working-directory: ${{ runner.temp }}/stable-candidate
        run: npm run build
      - name: Validate candidate
        working-directory: ${{ runner.temp }}/stable-candidate
        run: >-
          node --test
          tests/installer-modules.test.mjs
          tests/rin-cli.test.mjs
          tests/rpc-and-shared.test.mjs
          tests/bootstrap-entrypoint.test.mjs
          tests/release.test.mjs
          tests/release-scripts.test.mjs
      - name: Set stable version on candidate
        working-directory: ${{ runner.temp }}/stable-candidate
        run: npm version --no-git-tag-version '${{ steps.plan.outputs.version }}'
      - name: Publish stable package
        working-directory: ${{ runner.temp }}/stable-candidate
        run: npm publish --tag latest --access public
      - name: Update release manifest
        run: >-
          npm run release:manifest --
          --channel stable
          --version '${{ steps.plan.outputs.version }}'
          --ref '${{ steps.plan.outputs.beta_ref }}'
          --from-beta-version '${{ steps.plan.outputs.beta_version }}'
      - name: Commit stable metadata and tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-manifest.json
          git commit -m 'chore(release): promote beta ${{ steps.plan.outputs.beta_version }} to stable ${{ steps.plan.outputs.version }}' || true
          git tag 'v${{ steps.plan.outputs.version }}' '${{ steps.plan.outputs.beta_ref }}' || true
          git push origin HEAD:main --follow-tags
      - name: Prepare bootstrap branch checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          bootstrap_dir="$RUNNER_TEMP/stable-bootstrap"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin stable-bootstrap >/dev/null 2>&1; then
            git clone --depth 1 --branch stable-bootstrap "$remote_url" "$bootstrap_dir"
          else
            git init "$bootstrap_dir"
            git -C "$bootstrap_dir" checkout --orphan stable-bootstrap
            git -C "$bootstrap_dir" remote add origin "$remote_url"
          fi
          npm run release:bootstrap -- --output "$bootstrap_dir" --branch stable-bootstrap
          git -C "$bootstrap_dir" config user.name 'github-actions[bot]'
          git -C "$bootstrap_dir" config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C "$bootstrap_dir" add .
          if git -C "$bootstrap_dir" diff --cached --quiet; then
            echo 'No bootstrap changes to commit.'
          else
            git -C "$bootstrap_dir" commit -m 'chore(release): publish stable ${{ steps.plan.outputs.version }}'
            git -C "$bootstrap_dir" push origin HEAD:stable-bootstrap
          fi
      - name: Remove candidate worktree
        if: always()
        run: git worktree remove --force "$RUNNER_TEMP/stable-candidate" || true
