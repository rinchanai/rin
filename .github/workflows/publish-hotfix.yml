name: publish-hotfix

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish the hotfix from, typically a branch cut from the current stable tag.
        required: true
      version:
        description: Stable patch version to publish, for example 0.69.4
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-hotfix
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Fetch hotfix ref
        run: git fetch origin '${{ inputs.ref }}'
      - name: Prepare candidate worktree
        run: |
          set -eu
          candidate_dir="$RUNNER_TEMP/hotfix-candidate"
          git worktree add --detach "$candidate_dir" '${{ inputs.ref }}'
      - name: Install candidate dependencies
        working-directory: ${{ runner.temp }}/hotfix-candidate
        run: npm ci --no-fund --no-audit
      - name: Build candidate
        working-directory: ${{ runner.temp }}/hotfix-candidate
        run: npm run build
      - name: Validate candidate
        working-directory: ${{ runner.temp }}/hotfix-candidate
        run: >-
          node --test
          tests/installer-modules.test.mjs
          tests/rin-cli.test.mjs
          tests/rpc-and-shared.test.mjs
          tests/bootstrap-entrypoint.test.mjs
          tests/release.test.mjs
          tests/release-scripts.test.mjs
      - name: Set hotfix version on candidate
        working-directory: ${{ runner.temp }}/hotfix-candidate
        run: npm version --no-git-tag-version '${{ inputs.version }}'
      - name: Publish hotfix package
        working-directory: ${{ runner.temp }}/hotfix-candidate
        run: npm publish --tag latest --access public
      - name: Update release manifest
        run: >-
          npm run release:manifest --
          --channel stable
          --version '${{ inputs.version }}'
          --ref '${{ inputs.ref }}'
      - name: Commit hotfix metadata and tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-manifest.json
          git commit -m 'chore(release): publish hotfix ${{ inputs.version }}' || true
          git tag 'v${{ inputs.version }}' '${{ inputs.ref }}' || true
          git push origin HEAD:main --follow-tags
      - name: Prepare bootstrap branch checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          bootstrap_branch=bootstrap
          bootstrap_dir="$RUNNER_TEMP/$bootstrap_branch"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin "$bootstrap_branch" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$bootstrap_branch" "$remote_url" "$bootstrap_dir"
          else
            git init "$bootstrap_dir"
            git -C "$bootstrap_dir" checkout --orphan "$bootstrap_branch"
            git -C "$bootstrap_dir" remote add origin "$remote_url"
          fi
          npm run release:bootstrap -- --output "$bootstrap_dir" --branch "$bootstrap_branch"
          git -C "$bootstrap_dir" config user.name 'github-actions[bot]'
          git -C "$bootstrap_dir" config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C "$bootstrap_dir" add .
          if git -C "$bootstrap_dir" diff --cached --quiet; then
            echo 'No bootstrap changes to commit.'
          else
            git -C "$bootstrap_dir" commit -m 'chore(release): publish hotfix ${{ inputs.version }}'
            git -C "$bootstrap_dir" push origin "HEAD:$bootstrap_branch"
          fi
      - name: Remove candidate worktree
        if: always()
        run: git worktree remove --force "$RUNNER_TEMP/hotfix-candidate" || true
