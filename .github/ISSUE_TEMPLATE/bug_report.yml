name: Bug report
description: Report a bug in Rin.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        A short, reproducible report is usually the fastest to triage.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and did not find a matching report.
          required: true
        - label: I can reproduce this on the latest Rin version available to me.
          required: true
  - type: input
    id: version
    attributes:
      label: Rin version
      description: Paste the output of `rin --version`.
      placeholder: 0.0.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, install method, and shell/terminal if relevant.
      placeholder: |
        macOS 15 / install.sh / zsh
        or
        Ubuntu 24.04 / repo checkout / tmux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Tell us what happened and what you expected to happen instead.
      placeholder: |
        I ran `rin ...` and ...

        Expected:
        Actual:
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Share the smallest set of commands or steps that reproduces the issue.
      placeholder: |
        1. Run `rin ...`
        2. Open ...
        3. Do ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and additional context
      description: Paste `rin doctor`, terminal output, screenshots, or anything else that may help.
      render: shell
