name: Feature request
description: Suggest an improvement for Rin.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        The most helpful requests explain the problem first, then the solution you'd like to see.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and documentation and did not find the same request.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow gap, pain point, or limitation.
      placeholder: I'm trying to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the outcome or solution you'd like.
      placeholder: Rin could...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Alternatives or additional context
      description: Share workarounds, related tools, examples, mockups, or anything else that may help.
